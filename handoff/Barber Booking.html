<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ROYALE - Barber Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600;1,9..144,700&family=Frank+Ruhl+Libre:wght@500;700;900&family=Suez+One&family=Cormorant+Garamond:wght@500;600;700&family=Assistant:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ──────────────────────────────────────────────────────────────
     BRAND DESIGN TOKENS, single source of truth for the מספרפי
     palette + type. Changing a value here cascades to every screen.
     Brand lives in touchpoints (splash, headings, medallions);
     operational surfaces (calendar, forms, dashboard) stay neutral.
     ────────────────────────────────────────────────────────────── */
  :root {
    --navy: #0B1E3D;
    --navy-700: #14305A;
    --gold: #C8A24A;
    --gold-light: #E4C97B;
    --gold-deep: #9C7B2E;
    --paper: #FBF9F5;            /* neutral off-white (operational) */
    --cream-bg: #F6EEDF;         /* warm cream paper (customer touchpoints) */
    --cream-card: #FBF5EA;       /* subtle warm card fill */
    --cream-line: #E7DABE;       /* hairline on cream */
    /* heavy display face for HEADINGS, echoes the bold מספרפי letters */
    --display-he: 'Suez One', 'Frank Ruhl Libre', serif;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Assistant', system-ui, sans-serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #16335c 0%, transparent 55%),
      linear-gradient(180deg, #0a1830 0%, #07101f 100%);
    min-height: 100vh; color: #FBF9F5;
  }
  [dir="rtl"] { --chev: scaleX(-1); }
  [dir="ltr"] { --chev: none; }

  /* page shell */
  .stage { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 22px 16px 48px; gap: 20px; }
  .topbar { width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 14px; }
  .brandline { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .brandline .mark { font-family: 'Fraunces', serif; font-weight: 700; font-size: 19px; letter-spacing: 4px; color: #E4C97B; }
  .brandline .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(228,201,123,0.5); }
  .brandline .sub { font-size: 11px; letter-spacing: 2px; color: rgba(251,249,245,0.45); text-transform: uppercase; }

  .controls { display: flex; gap: 10px; align-items: stretch; }
  .seg { flex: 1; display: flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 4px; gap: 3px; }
  .seg button { flex: 1; border: none; background: transparent; color: rgba(251,249,245,0.6); font: inherit; font-size: 13px; font-weight: 600; padding: 9px 6px; border-radius: 10px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .seg button.on { background: linear-gradient(135deg,#E4C97B,#C8A24A); color: #0B1E3D; box-shadow: 0 4px 12px rgba(200,162,74,0.3); }
  .langtoggle { display: flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 4px; }
  .langtoggle button { border: none; background: transparent; color: rgba(251,249,245,0.55); font: inherit; font-size: 12.5px; font-weight: 700; padding: 9px 13px; border-radius: 10px; cursor: pointer; transition: all .2s; }
  .langtoggle button.on { background: rgba(255,255,255,0.12); color: #FBF9F5; }

  .devwrap { filter: drop-shadow(0 50px 70px rgba(0,0,0,0.45)); }

  /* ── micro-interaction keyframes ──
     Resting state is the visible end-state; entrances only animate when motion
     is allowed, so content never depends on the animation clock advancing. */
  @keyframes geoPing { 0% { transform: scale(0.5); opacity: 0.7; } 100% { transform: scale(2.1); opacity: 0; } }
  .geo-ping { position: absolute; inset: 4px; border-radius: 50%; border: 2px solid; opacity: 0; }
  @keyframes pcSpin { to { transform: rotate(360deg); } }
  .pc-spin { display: inline-block; animation: pcSpin .8s linear infinite; }

  @keyframes succPop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); } }
  @keyframes succRise { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .succ-d1 { animation-delay: .12s; } .succ-d2 { animation-delay: .24s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* functional exit (triggered, brief), safe to keep unconditionally */
  @keyframes cardFade { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95) translateX(var(--cf,0)); } }
  .card-fade { animation: cardFade .42s cubic-bezier(.4,0,1,1) both; pointer-events: none; }

  @keyframes undoIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* trust round, micro-feedback */
  @keyframes cartBounce { 0% { transform: scale(1); } 35% { transform: scale(1.5); } 60% { transform: scale(0.86); } 100% { transform: scale(1); } }
  .cart-bounce { animation: cartBounce .5s cubic-bezier(.2,1.3,.4,1); }
  @keyframes confirmGrow { from { opacity: 0; max-height: 0; transform: translateY(-4px); } to { opacity: 1; max-height: 220px; transform: translateY(0); } }
  .confirm-grow { overflow: hidden; }
  /* gold glint sweep on the Book CTA, fires every 3s, idle between */
  .cta-glintwrap { position: relative; overflow: hidden; border-radius: 16px; }
  .cta-glint { position: absolute; top: 0; bottom: 0; width: 42%; pointer-events: none; z-index: 2;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.55), transparent); transform: translateX(-180%) skewX(-16deg); opacity: 0; }
  @keyframes ctaGlint { 0% { transform: translateX(-180%) skewX(-16deg); opacity: 0; } 4% { opacity: 1; } 22% { transform: translateX(320%) skewX(-16deg); opacity: 0; } 100% { transform: translateX(320%) skewX(-16deg); opacity: 0; } }
  @keyframes ctaPulse { 0%, 100% { box-shadow: 0 10px 24px rgba(200,162,74,0.34); } 8% { box-shadow: 0 10px 30px rgba(200,162,74,0.6); } 24% { box-shadow: 0 10px 24px rgba(200,162,74,0.34); } }

  @keyframes sheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

  @keyframes screenSwap { from { transform: translateY(16px); } to { transform: translateY(0); } }
  @keyframes calFade { from { opacity: 0.45; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .screen-swap { position: absolute; inset: 0; z-index: 90; opacity: 1; }
  @keyframes s2Rise { from { transform: translateY(12px); } to { transform: translateY(0); } }
  .s2-rise { opacity: 1; }
  @keyframes s2Pop { 0% { transform: scale(0.92) translateY(18px); } 100% { transform: scale(1) translateY(0); } }
  .s2-pop { opacity: 1; }
  @keyframes ttlBell { 0%,60%,100% { transform: rotate(0); } 70% { transform: rotate(-12deg); } 80% { transform: rotate(10deg); } 90% { transform: rotate(-6deg); } }

  /* onboarding splash shimmer */
  @keyframes obShimmer { 0% { transform: translateX(-160%) skewX(-18deg); } 100% { transform: translateX(160%) skewX(-18deg); } }
  .ob-shimmer-wrap { overflow: hidden; }
  .ob-shimmer { position: absolute; top: 0; bottom: 0; width: 55%; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(228,201,123,0.55), transparent); opacity: 0; }
  @keyframes obPop { 0% { opacity: 0; transform: scale(0.86); } 100% { opacity: 1; transform: scale(1); } }
  .ob-shimmer-wrap { animation: obPop .7s cubic-bezier(.2,1,.3,1) both; }
  @keyframes obTagIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .ob-splash-tag { opacity: 0; }
  @media (prefers-reduced-motion: no-preference) {
    .ob-shimmer { animation: obShimmer 1.5s ease-in-out .45s 1 both; }
    .ob-splash-tag { animation: obTagIn .6s ease .5s both; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .geo-ping { animation: geoPing 1.4s ease-out infinite; }
    .geo-ping-2 { animation-delay: 0.5s; }
    .succ-pop { animation: succPop .6s cubic-bezier(.2,1.3,.4,1) both; }
    .succ-rise { animation: succRise .55s cubic-bezier(.16,1,.3,1) both; }
    .fade-in { animation: fadeIn .4s ease both; }
    .undo-in { animation: undoIn .4s cubic-bezier(.16,1,.3,1) both; }
    .sheet-in { animation: sheetIn .34s cubic-bezier(.16,1,.3,1); }
    .screen-swap { animation: screenSwap .38s cubic-bezier(.16,1,.3,1); }
    .s2-rise { animation: s2Rise .5s cubic-bezier(.16,1,.3,1) both; }
    .s2-pop { animation: s2Pop .5s cubic-bezier(.2,1.1,.4,1) both; }
    .ttl-bell { animation: ttlBell 2.2s ease-in-out infinite; transform-origin: top center; }
    .cta-glint { animation: ctaGlint 3s ease-in-out infinite; }
    .cta-glintwrap { animation: ctaPulse 3s ease-in-out infinite; }
    .confirm-grow { animation: confirmGrow .32s cubic-bezier(.16,1,.3,1) both; }
    .cal-fade { animation: calFade .28s ease both; }
  }

  /* ── Brand medallion (logo + barber badge share this frame) ── */
  .medallion-halo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); border-radius: 50%; background: radial-gradient(circle, rgba(228,201,123,0.30), transparent 66%); pointer-events: none; }

  @media (max-width: 480px) { .stage { padding: 14px 8px 30px; } }

  /* tap feedback for clickable dashboard cards */
  .tapsq, .metric-card { transition: transform .14s ease, box-shadow .2s ease; }
  .tapsq:active, .metric-card:active { transform: scale(0.975); }
</style>

<script>
// ── transient-fetch recovery ─────────────────────────────────────────────
// Babel-standalone fetches each text/babel script once; if the preview server
// drops a request (transient network hiccup) the module is silently skipped and
// the app boots blank. This loader re-fetches any module whose sentinel global
// is still missing and evals it through Babel manually.
(function () {
  var MODS = [
    ['useTweaks', 'tweaks-panel.jsx'],
    ['DATA', 'app/data.jsx'],
    ['Onboarding', 'app/onboarding.jsx'],
    ['Btn', 'app/ui.jsx'],
    ['AddressBlock', 'app/address.jsx'],
    ['BookingFlow', 'app/booking.jsx'],
    ['CartFlow', 'app/cart.jsx'],
    ['CustomerApp', 'app/customer.jsx'],
    ['ShopScreen', 'app/shop.jsx'],
    ['NewScreen', 'app/screens2.jsx'],
    ['docStore', 'app/documents.jsx'],
    ['punchStore', 'app/punchcard.jsx'],
    ['PunchPackagesSection', 'app/packages.jsx'],
    ['PunchWalletSheet', 'app/wallet.jsx'],
    ['CustomersScreen', 'app/customers.jsx'],
    ['BarberSheet', 'app/staffedit.jsx'],
    ['ServiceTypesScreen', 'app/servicetypes.jsx'],
    ['AdminGalleryScreen', 'app/gallery.jsx'],
    ['HealthDeclarationSheet', 'app/health.jsx'],
    ['NotifyClientSheet', 'app/proactive.jsx'],
    ['PendingList', 'app/approvals.jsx'],
    ['CustomerCard', 'app/customercard.jsx'],
    ['DormantScreen', 'app/crm.jsx'],
    ['WeeklyScheduleEditor', 'app/schedule.jsx'],
    ['ExceptionsEditor', 'app/exceptions.jsx'],
    ['SettingsScreen', 'app/settings.jsx'],
    ['expenseStore', 'app/expenses.jsx'],
    ['AutomationsScreen', 'app/automations.jsx'],
    ['SocialPostScreen', 'app/marketing.jsx'],
    ['Calendar', 'app/calendar.jsx'],
    ['BarberApp', 'app/staff.jsx'],
  ];
  var busy = {};
  window.__royaleSentinels = MODS.map(function (m) { return m[0]; });
  window.__recoverMissingModules = function () {
    if (typeof Babel === 'undefined') return;
    MODS.forEach(function (m) {
      var g = m[0], f = m[1];
      if (typeof window[g] !== 'undefined' || busy[f]) return;
      busy[f] = true;
      fetch(f).then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(function (src) { (new Function(Babel.transform(src, { presets: ['react'] }).code))(); console.log('[recovery] reloaded ' + f); })
        .catch(function () {})
        .then(function () { busy[f] = false; });
    });
  };
})();
</script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Round A · barber wears the customer hat: one phone number, two hats, no duplicate profile ──
function BarberCustomerSwitch({ lang, accent, onSwitch }) {
  const he = lang === 'he';
  return (
    <button onClick={onSwitch} style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%', background: 'linear-gradient(135deg,rgba(228,201,123,0.16),rgba(200,162,74,0.08))', border: '1.5px dashed rgba(200,162,74,0.55)', borderRadius: 16, padding: '12px 14px', cursor: 'pointer', font: 'inherit', textAlign: 'start' }}>
      <span style={{ width: 38, height: 38, borderRadius: 11, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: '0 2px 8px rgba(11,30,61,0.08)' }}><Icon name="user" size={19} color={accent} /></span>
      <span style={{ flex: 1 }}>
        <span style={{ display: 'block', fontWeight: 700, fontSize: 14.5, color: '#0B1E3D' }}>{he ? 'אני עכשיו לקוח' : "I'm a customer now"}</span>
        <span style={{ display: 'block', fontSize: 11.5, color: 'rgba(11,30,61,0.55)', marginTop: 1 }}>{he ? 'מעבר זמני לממשק הלקוח לקביעת תור אצל ספר אחר · אותו מספר טלפון' : 'Temporarily switch to the customer app to book with another barber · same number'}</span>
      </span>
      <Icon name={he ? 'chevron' : 'chevronR'} size={17} color="rgba(11,30,61,0.35)" />
    </button>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#C8A24A",
  "serifEn": "Fraunces",
  "bookingOrder": "serviceFirst",
  "sound": true,
  "firstMonth": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // Round 32: language auto-detected from device; customer can override in profile;
  // barber/admin are always Hebrew - no toggle exposed to them.
  const [lang, setLang] = useState(() => {
    try {
      const saved = localStorage.getItem('royale_lang_v1');
      if (saved === 'he' || saved === 'en') return saved;
      return (navigator.language || '').startsWith('en') ? 'en' : 'he';
    } catch (e) { return 'he'; }
  });
  const changeLang = (l) => { setLang(l); try { localStorage.setItem('royale_lang_v1', l); } catch (e) {} };
  const [role, setRole] = useState(() => { try { const s = JSON.parse(localStorage.getItem('royale_session_v1')); return (s && s.role) || 'customer'; } catch (e) { return 'customer'; } });
  const [custMode, setCustMode] = useState(false); // Round A: barber temporarily acting as a customer
  const custModeActive = role === 'barber' && custMode;
  const [toast, setToast] = useState(null);
  const [taglines, setTaglines] = useState(() => {
    try { return JSON.parse(localStorage.getItem('royale_taglines_v1')) || {}; } catch (e) { return {}; }
  });
  const setTagline = (id, lng, val) => setTaglines(prev => {
    const next = { ...prev, [id]: { ...(prev[id] || {}), [lng]: val } };
    try { localStorage.setItem('royale_taglines_v1', JSON.stringify(next)); } catch (e) {}
    return next;
  });
  const [products, setProducts] = useState(() => {
    try { const s = JSON.parse(localStorage.getItem('royale_products_v1')); return (s && s.length) ? s : DATA.products; } catch (e) { return DATA.products; }
  });
  const persistProducts = (next) => { try { localStorage.setItem('royale_products_v1', JSON.stringify(next)); } catch (e) {} return next; };
  const setProduct = (id, patch) => setProducts(prev => persistProducts(prev.map(p => p.id === id ? { ...p, ...patch } : p)));
  const addProduct = () => setProducts(prev => persistProducts([...prev, { id: 'pr' + Date.now(), he: str.newProduct, en: 'New product', price: 0, photoHe: 'תמונת מוצר', photoEn: 'product photo', descHe: '', descEn: '', inStock: true, tag: 'wax' }]));
  const delProduct = (id) => setProducts(prev => persistProducts(prev.filter(p => p.id !== id)));
  const reorderProducts = (ids) => setProducts(prev => persistProducts(ids.map(id => prev.find(p => p.id === id)).filter(Boolean)));
  // ── customer directory: seed (DATA.customers) + customers who register through onboarding ──
  const [customers, setCustomers] = useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem('royale_customers_v1'));
      if (!s || !s.length) return DATA.customers;
      // merge seed-only metadata (e.g. birthday) onto stored records by id; stored values
      // win for everything they define, so registered customers and edits are preserved.
      return s.map(c => { const seed = DATA.customers.find(x => x.id === c.id); return seed ? { ...seed, ...c } : c; });
    } catch (e) { return DATA.customers; }
  });
  const addCustomerRecord = (rec) => setCustomers(prev => {
    const ph = (rec.phone || '').replace(/[^0-9]/g, '');
    if (!ph || prev.some(c => (c.phone || '').replace(/[^0-9]/g, '') === ph)) return prev;
    const next = [...prev, rec];
    try { localStorage.setItem('royale_customers_v1', JSON.stringify(next)); } catch (e) {}
    return next;
  });
  // ── service types (price list), editable + persisted, mirrored into DATA.services ──
  const [services, setServices] = useState(() => {
    try { const s = JSON.parse(localStorage.getItem('royale_services_v2')); return (s && s.length) ? s : DATA.services; } catch (e) { return DATA.services; }
  });
  const persistServices = (next) => { try { localStorage.setItem('royale_services_v2', JSON.stringify(next)); } catch (e) {} return next; };
  const setService = (id, patch) => setServices(prev => persistServices(prev.map(s => s.id === id ? { ...s, ...patch } : s)));
  const addService = (s) => setServices(prev => persistServices([...prev, s]));
  const delService = (id) => setServices(prev => persistServices(prev.filter(s => s.id !== id)));
  const _ac = (b) => { const d = DATA.staffDefaults.find(s => s.id === b.id) || {}; return b.autoConfirm !== undefined ? b.autoConfirm : (d.autoConfirm !== false); };
  const [staff, setStaff] = useState(() => {
    const base = DATA.barbers.map(b => { const d = DATA.staffDefaults.find(s => s.id === b.id) || {}; return { ...b, active: d.active !== false, autoConfirm: d.autoConfirm !== false, start: d.start || '09:00', end: d.end || '18:00', breaks: d.breaks || [], services: d.services || DATA.services.map(s => s.id), deal: d.deal || { type: b.owner ? 'owner' : 'percent', managerPct: b.owner ? 100 : 50 } }; });
    // Round G1: backfill `deal` on any persisted barber saved before deals existed.
    const _deal = (b) => b.deal || (DATA.staffDefaults.find(x => x.id === b.id) || {}).deal || { type: b.owner ? 'owner' : 'percent', managerPct: b.owner ? 100 : 50 };
    try { const s = JSON.parse(localStorage.getItem('royale_staff_v3')); return (s && s.length) ? s.map(b => ({ ...b, autoConfirm: _ac(b), phone: b.phone || (DATA.barbers.find(x => x.id === b.id) || {}).phone || '', deal: _deal(b) })) : base; } catch (e) { return base; }
  });
  const persistStaff = (next) => { try { localStorage.setItem('royale_staff_v3', JSON.stringify(next)); } catch (e) {} return next; };
  const updateBarber = (id, patch) => setStaff(prev => persistStaff(prev.map(b => b.id === id ? { ...b, ...patch } : b)));
