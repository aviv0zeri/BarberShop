<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ROYALE - Barber Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600;1,9..144,700&family=Frank+Ruhl+Libre:wght@500;700;900&family=Suez+One&family=Cormorant+Garamond:wght@500;600;700&family=Assistant:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ──────────────────────────────────────────────────────────────
     BRAND DESIGN TOKENS, single source of truth for the מספרפי
     palette + type. Changing a value here cascades to every screen.
     Brand lives in touchpoints (splash, headings, medallions);
     operational surfaces (calendar, forms, dashboard) stay neutral.
     ────────────────────────────────────────────────────────────── */
  :root {
    --navy: #0B1E3D;
    --navy-700: #14305A;
    --gold: #C8A24A;
    --gold-light: #E4C97B;
    --gold-deep: #9C7B2E;
    --paper: #FBF9F5;            /* neutral off-white (operational) */
    --cream-bg: #F6EEDF;         /* warm cream paper (customer touchpoints) */
    --cream-card: #FBF5EA;       /* subtle warm card fill */
    --cream-line: #E7DABE;       /* hairline on cream */
    /* heavy display face for HEADINGS, echoes the bold מספרפי letters */
    --display-he: 'Suez One', 'Frank Ruhl Libre', serif;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Assistant', system-ui, sans-serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #16335c 0%, transparent 55%),
      linear-gradient(180deg, #0a1830 0%, #07101f 100%);
    min-height: 100vh; color: #FBF9F5;
  }
  [dir="rtl"] { --chev: scaleX(-1); }
  [dir="ltr"] { --chev: none; }

  /* page shell */
  .stage { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 22px 16px 48px; gap: 20px; }
  .topbar { width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 14px; }
  .brandline { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .brandline .mark { font-family: 'Fraunces', serif; font-weight: 700; font-size: 19px; letter-spacing: 4px; color: #E4C97B; }
  .brandline .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(228,201,123,0.5); }
  .brandline .sub { font-size: 11px; letter-spacing: 2px; color: rgba(251,249,245,0.45); text-transform: uppercase; }

  .controls { display: flex; gap: 10px; align-items: stretch; }
  .seg { flex: 1; display: flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 4px; gap: 3px; }
  .seg button { flex: 1; border: none; background: transparent; color: rgba(251,249,245,0.6); font: inherit; font-size: 13px; font-weight: 600; padding: 9px 6px; border-radius: 10px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .seg button.on { background: linear-gradient(135deg,#E4C97B,#C8A24A); color: #0B1E3D; box-shadow: 0 4px 12px rgba(200,162,74,0.3); }
  .langtoggle { display: flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 4px; }
  .langtoggle button { border: none; background: transparent; color: rgba(251,249,245,0.55); font: inherit; font-size: 12.5px; font-weight: 700; padding: 9px 13px; border-radius: 10px; cursor: pointer; transition: all .2s; }
  .langtoggle button.on { background: rgba(255,255,255,0.12); color: #FBF9F5; }

  .devwrap { filter: drop-shadow(0 50px 70px rgba(0,0,0,0.45)); }

  /* ── micro-interaction keyframes ──
     Resting state is the visible end-state; entrances only animate when motion
     is allowed, so content never depends on the animation clock advancing. */
  @keyframes geoPing { 0% { transform: scale(0.5); opacity: 0.7; } 100% { transform: scale(2.1); opacity: 0; } }
  .geo-ping { position: absolute; inset: 4px; border-radius: 50%; border: 2px solid; opacity: 0; }
  @keyframes pcSpin { to { transform: rotate(360deg); } }
  .pc-spin { display: inline-block; animation: pcSpin .8s linear infinite; }

  @keyframes succPop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); } }
  @keyframes succRise { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .succ-d1 { animation-delay: .12s; } .succ-d2 { animation-delay: .24s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* functional exit (triggered, brief), safe to keep unconditionally */
  @keyframes cardFade { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95) translateX(var(--cf,0)); } }
  .card-fade { animation: cardFade .42s cubic-bezier(.4,0,1,1) both; pointer-events: none; }

  @keyframes undoIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* trust round, micro-feedback */
  @keyframes cartBounce { 0% { transform: scale(1); } 35% { transform: scale(1.5); } 60% { transform: scale(0.86); } 100% { transform: scale(1); } }
  .cart-bounce { animation: cartBounce .5s cubic-bezier(.2,1.3,.4,1); }
  @keyframes confirmGrow { from { opacity: 0; max-height: 0; transform: translateY(-4px); } to { opacity: 1; max-height: 220px; transform: translateY(0); } }
  .confirm-grow { overflow: hidden; }
  /* gold glint sweep on the Book CTA, fires every 3s, idle between */
  .cta-glintwrap { position: relative; overflow: hidden; border-radius: 16px; }
  .cta-glint { position: absolute; top: 0; bottom: 0; width: 42%; pointer-events: none; z-index: 2;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.55), transparent); transform: translateX(-180%) skewX(-16deg); opacity: 0; }
  @keyframes ctaGlint { 0% { transform: translateX(-180%) skewX(-16deg); opacity: 0; } 4% { opacity: 1; } 22% { transform: translateX(320%) skewX(-16deg); opacity: 0; } 100% { transform: translateX(320%) skewX(-16deg); opacity: 0; } }
  @keyframes ctaPulse { 0%, 100% { box-shadow: 0 10px 24px rgba(200,162,74,0.34); } 8% { box-shadow: 0 10px 30px rgba(200,162,74,0.6); } 24% { box-shadow: 0 10px 24px rgba(200,162,74,0.34); } }

  @keyframes sheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

  @keyframes screenSwap { from { transform: translateY(16px); } to { transform: translateY(0); } }
  @keyframes calFade { from { opacity: 0.45; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .screen-swap { position: absolute; inset: 0; z-index: 90; opacity: 1; }
  @keyframes s2Rise { from { transform: translateY(12px); } to { transform: translateY(0); } }
  .s2-rise { opacity: 1; }
  @keyframes s2Pop { 0% { transform: scale(0.92) translateY(18px); } 100% { transform: scale(1) translateY(0); } }
  .s2-pop { opacity: 1; }
  @keyframes ttlBell { 0%,60%,100% { transform: rotate(0); } 70% { transform: rotate(-12deg); } 80% { transform: rotate(10deg); } 90% { transform: rotate(-6deg); } }

  /* onboarding splash shimmer */
  @keyframes obShimmer { 0% { transform: translateX(-160%) skewX(-18deg); } 100% { transform: translateX(160%) skewX(-18deg); } }
  .ob-shimmer-wrap { overflow: hidden; }
  .ob-shimmer { position: absolute; top: 0; bottom: 0; width: 55%; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(228,201,123,0.55), transparent); opacity: 0; }
  @keyframes obPop { 0% { opacity: 0; transform: scale(0.86); } 100% { opacity: 1; transform: scale(1); } }
  .ob-shimmer-wrap { animation: obPop .7s cubic-bezier(.2,1,.3,1) both; }
  @keyframes obTagIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .ob-splash-tag { opacity: 0; }
  @media (prefers-reduced-motion: no-preference) {
    .ob-shimmer { animation: obShimmer 1.5s ease-in-out .45s 1 both; }
    .ob-splash-tag { animation: obTagIn .6s ease .5s both; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .geo-ping { animation: geoPing 1.4s ease-out infinite; }
    .geo-ping-2 { animation-delay: 0.5s; }
    .succ-pop { animation: succPop .6s cubic-bezier(.2,1.3,.4,1) both; }
    .succ-rise { animation: succRise .55s cubic-bezier(.16,1,.3,1) both; }
    .fade-in { animation: fadeIn .4s ease both; }
    .undo-in { animation: undoIn .4s cubic-bezier(.16,1,.3,1) both; }
    .sheet-in { animation: sheetIn .34s cubic-bezier(.16,1,.3,1); }
    .screen-swap { animation: screenSwap .38s cubic-bezier(.16,1,.3,1); }
    .s2-rise { animation: s2Rise .5s cubic-bezier(.16,1,.3,1) both; }
    .s2-pop { animation: s2Pop .5s cubic-bezier(.2,1.1,.4,1) both; }
    .ttl-bell { animation: ttlBell 2.2s ease-in-out infinite; transform-origin: top center; }
    .cta-glint { animation: ctaGlint 3s ease-in-out infinite; }
    .cta-glintwrap { animation: ctaPulse 3s ease-in-out infinite; }
    .confirm-grow { animation: confirmGrow .32s cubic-bezier(.16,1,.3,1) both; }
    .cal-fade { animation: calFade .28s ease both; }
  }

  /* ── Brand medallion (logo + barber badge share this frame) ── */
  .medallion-halo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); border-radius: 50%; background: radial-gradient(circle, rgba(228,201,123,0.30), transparent 66%); pointer-events: none; }

  @media (max-width: 480px) { .stage { padding: 14px 8px 30px; } }

  /* tap feedback for clickable dashboard cards */
  .tapsq, .metric-card { transition: transform .14s ease, box-shadow .2s ease; }
  .tapsq:active, .metric-card:active { transform: scale(0.975); }
</style>
</head>

  //  and filtered out of the regular booking flow and the admin price list)
  DATA.services = window.PUNCH_SERVICES ? services.concat(window.PUNCH_SERVICES) : services;
  // mirror the live customer directory into DATA so every reader (customers screen, CRM,
  // dormant, regulars, counts) sees registered customers, not just the static seed.
  DATA.customers = customers;
  // live customer name for cross-role identity resolution (window.clientLabel reads this)
  window.__meName = (custModeActive && session && session.name) || meProfile.name || (session && session.role === 'customer' && session.name) || '';
  window.__meEmail = meProfile.email || (session && session.email) || '';

  const str = STR[lang];
  const accent = t.accent;
  const serif = lang === 'he' ? 'Frank Ruhl Libre' : t.serifEn;
  const cfg = { bookingOrder: t.bookingOrder };

  useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
    document.body.style.fontFamily = lang === 'he' ? "'Assistant', system-ui, sans-serif" : "'Inter', system-ui, sans-serif";
  }, [lang]);

  const notify = () => {
    setToast({ title: str.notifTitle, body: str.notifBody });
    playChime(t.sound);
  };
  const showToast = (title, body) => { setToast({ title, body }); playChime(t.sound); };

  const roles = [
    { id: 'customer', label: str.rCustomer, icon: 'user' },
    { id: 'barber', label: str.rBarber, icon: 'scissors' },
    { id: 'admin', label: str.rAdmin, icon: 'chart' },
  ];

  return (
    <div className="stage">
      <div className="topbar">
        <div className="brandline">
          <span style={{ width: 30, height: 30, borderRadius: '50%', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden', flexShrink: 0 }}><Emblem size={28} blend={false} /></span>
          <span className="mark" style={{ fontFamily: lang === 'he' ? "'Suez One', 'Frank Ruhl Libre', serif" : undefined, letterSpacing: lang === 'he' ? 1 : 4 }}>{lang === 'he' ? 'מספרפי' : 'BARBER SHOP'}</span><span className="dot"></span>
          <span className="sub">{lang === 'he' ? 'מערכת תורים' : 'Booking System'}</span>
        </div>
        <div className="controls">
          <div className="seg">
            {roles.map(r => (
              <button key={r.id} className={role === r.id ? 'on' : ''} onClick={() => { setRole(r.id); setCustMode(false); }}>
                <Icon name={r.icon} size={15} stroke={2} />{r.label}
              </button>
            ))}
          </div>

        </div>
      </div>

      <div className="devwrap">
        <IOSDevice dark={role !== 'customer' ? false : false}>
          <div style={{ position: 'absolute', inset: 0 }} dir={lang === 'he' ? 'rtl' : 'ltr'}>
            {!session && <Onboarding lang={lang} t={str} accent={accent} serif={serif} staff={staff} onDone={onboardDone} />}
            {session && (role === 'customer' || custModeActive) && <CustomerApp key={lang + (custModeActive ? '-cust' : '')} lang={lang} t={str} accent={accent} serif={serif} cfg={cfg} taglines={taglines} products={products} notify={notify} toast={showToast} staff={custModeActive ? staff.filter(b => b.id !== ((session && session.barberId) || 'p1')) : staff} globalAppts={appts} addAppt={(a) => { if (a && a.paid === 'prepaid' && window.punchStore) window.punchStore.closeByAppt(a.id); setAppts(prev => [...prev, a]); }} removeAppt={(id) => setAppts(prev => { const a = prev.find(x => x.id === id); if (a && a.paid === 'prepaid' && window.punchStore) window.punchStore.openDecision(a, 'cancel'); return prev.filter(x => x.id !== id); })} updateApptTime={(id, patch) => setAppts(prev => prev.map(a => a.id === id ? { ...a, ...patch } : a))} onNewRequest={onNewRequest} staffNotify={staffNotify} session={custModeActive && session ? { ...session, role: 'customer' } : session} setRegion={setRegion} updateSession={updateSession} onLogout={logout} onChangeLang={changeLang} />}
            {custModeActive && (
              <div style={{ position: 'absolute', bottom: 96, left: 0, right: 0, display: 'flex', justifyContent: 'center', zIndex: 94, pointerEvents: 'none' }}>
                <button onClick={() => setCustMode(false)} style={{ pointerEvents: 'auto', display: 'flex', alignItems: 'center', gap: 8, padding: '10px 16px', borderRadius: 30, border: '1px solid rgba(228,201,123,0.5)', background: 'linear-gradient(135deg,#14305A,#0B1E3D)', color: '#FBF9F5', font: 'inherit', fontSize: 13, fontWeight: 700, cursor: 'pointer', boxShadow: '0 10px 26px rgba(11,30,61,0.4)' }}>
                  <Icon name="scissors" size={15} color="#E4C97B" />{lang === 'he' ? 'חזרה לדשבורד הספר' : 'Back to barber dashboard'}
                </button>
              </div>
            )}
            {session && role === 'barber' && !custMode && <BarberApp key="barber" lang="he" t={STR['he']} accent={accent} serif={serif} taglines={taglines} meId={session.barberId || 'p1'} modeSwitch={<BarberCustomerSwitch lang={lang} accent={accent} onSwitch={() => setCustMode(true)} />} staff={staff} appts={appts} setAppts={setAppts} updateBarber={updateBarber} approveAppt={approveAppt} rejectAppt={rejectAppt} notify={notify} toast={showToast} onLogout={logout} />}
            {session && role === 'admin' && <AdminApp key="admin" lang="he" t={STR['he']} accent={accent} serif={serif} notify={notify} toast={showToast} taglines={taglines} setTagline={setTagline} products={products} setProduct={setProduct} addProduct={addProduct} delProduct={delProduct} reorderProducts={reorderProducts} services={services} setService={setService} addService={addService} delService={delService} staff={staff} updateBarber={updateBarber} addBarber={addBarber} removeBarber={removeBarber} appts={appts} setAppts={setAppts} approveAppt={approveAppt} rejectAppt={rejectAppt} notifyBarbers={notifyBarbers} toggleNotifyBarber={toggleNotifyBarber} pushNotify={pushNotify} firstMonth={t.firstMonth} onLogout={logout} />}
            <Toast data={toast} onClose={() => setToast(null)} dir={lang} />
            {session && liveReq && ((role === 'barber' && (session.barberId || 'p1') === liveReq.barberId) || (role === 'admin' && notifyBarbers[liveReq.barberId] !== false)) && (
              <IncomingBanner lang={lang} accent={accent} serif={serif} appt={liveReq} isPending={liveReq.status === 'pending'} staff={staff}
                readOnly={role === 'admin' && liveReq.barberId !== 'rafi'}
                onApprove={() => { approveAppt(liveReq.id); showToast(lang === 'he' ? 'התור אושר ✓' : 'Approved ✓', lang === 'he' ? 'נשלח אישור ללקוח' : 'Client notified'); setLiveReq(null); }}
                onReject={() => { rejectAppt(liveReq.id, lang === 'he' ? 'לצערנו לא נוכל לקבוע תור בשעה זו, עמך הסליחה. נשמח להציע מועד חלופי.' : "Sorry, we can't take this slot, we'd gladly offer another time."); showToast(lang === 'he' ? 'הבקשה נדחתה' : 'Declined', lang === 'he' ? 'נשלחה הודעה ללקוח' : 'Client notified'); setLiveReq(null); }}
                onDismiss={() => setLiveReq(null)} />
            )}
            {session && role === 'customer' && custAlert && (
              <ClientAlertBanner lang={lang} accent={accent} serif={serif} alert={custAlert} staff={staff}
                onClose={() => setCustAlert(null)} />
            )}
            {session && (role === 'barber' || role === 'admin') && staffAlert && (!staffAlert.barberId || (role === 'barber' && (session.barberId || 'p1') === staffAlert.barberId) || (role === 'admin' && notifyBarbers[staffAlert.barberId] !== false)) && (
              <StaffBanner lang={lang} accent={accent} serif={serif} alert={staffAlert} onClose={() => setStaffAlert(null)} />
            )}
            {session && (role === 'barber' || role === 'admin') && payDecision && (
              <RejectPaidSheet lang={lang} accent={accent} serif={serif} appt={payDecision.appt}
                onClose={() => setPayDecision(null)}
                onResolve={(how) => {
                  doRejectAppt(payDecision.appt.id, payDecision.msg);
                  showToast(
                    how === 'refunded' ? (lang === 'he' ? 'הבקשה נדחתה, התשלום הוחזר ✓' : 'Declined, refunded ✓') : (lang === 'he' ? 'הבקשה נדחתה, נשלחה הצעה למועד חדש ✓' : 'Declined, rebook offer sent ✓'),
                    lang === 'he' ? 'הלקוח קיבל הודעה' : 'Client notified');
                  setPayDecision(null);
                }} />
            )}
          </div>
        </IOSDevice>
      </div>

      <TweaksPanel>
        <TweakSection label={lang === 'he' ? 'מראה' : 'Appearance'} />
        <TweakColor label={lang === 'he' ? 'גוון זהב' : 'Gold accent'} value={t.accent}
          options={['#C8A24A', '#B89A5E', '#B08D57', '#A8862F']}
          onChange={v => setTweak('accent', v)} />
        <TweakSelect label={lang === 'he' ? 'גופן כותרות (אנגלית)' : 'Heading serif (EN)'} value={t.serifEn}
          options={['Fraunces', 'Cormorant Garamond']}
          onChange={v => setTweak('serifEn', v)} />
        <TweakSection label={lang === 'he' ? 'חוויית הזמנה' : 'Booking UX'} />
        <TweakRadio label={lang === 'he' ? 'סדר השלבים' : 'Step order'} value={t.bookingOrder}
          options={['barberFirst', 'serviceFirst']}
          onChange={v => setTweak('bookingOrder', v)} />
        <TweakSection label={lang === 'he' ? 'התראות' : 'Notifications'} />
        <TweakToggle label={lang === 'he' ? 'צליל התראה' : 'Notification sound'} value={t.sound}
          onChange={v => setTweak('sound', v)} />
        <TweakSection label={lang === 'he' ? 'לוח בקרה (מנהל)' : 'Dashboard (admin)'} />
        <TweakToggle label={lang === 'he' ? 'מצב חודש ראשון (ללא היסטוריה)' : 'First-month (no history)'} value={t.firstMonth}
          onChange={v => setTweak('firstMonth', v)} />
      </TweaksPanel>
    </div>
  );
}

function __bootRoyale() {
  var need = (window.__royaleSentinels || []).concat(['AdminApp', 'SuccessScreen', 'BossSheet', 'Icon', 'STR']);
  var missing = need.filter(function (n) { return typeof window[n] === 'undefined'; });
  if (missing.length) {
    window.__bootTries = (window.__bootTries || 0) + 1;
    // after ~0.9s of waiting, assume a dropped fetch and start recovery passes
    if (window.__bootTries % 30 === 0 && window.__recoverMissingModules) window.__recoverMissingModules();
    return setTimeout(__bootRoyale, 30);
  }
  if (window.__royaleMounted) return;
  window.__royaleMounted = true;
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
__bootRoyale();
</script>
</body>
</html>
